version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agentic_rag_app
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - chromadb
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8001
    command: >
      uvicorn api.app:app
      --host 0.0.0.0
      --port 8000

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    restart: always
    ports:
      - "8001:8001"
    volumes:
      - ./chroma_db:/chroma/chroma

  mongo:
    image: mongo:6.0
    container_name: agentic_rag_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:

